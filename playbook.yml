---
- name: Deploiement DEV
  hosts: dev
  become: true
  gather_facts: true

  vars:
    page_dest: /var/www/html/index.html
    yarn_repo_file: /etc/apt/sources.list.d/yarn.list
    yarn_repo_disabled_file: /etc/apt/sources.list.d/yarn.list.disabled
    app_name: "Application DEV"
    env: "dev"
    author: "Faye"
    page_title: "{{ app_name }}"
    app_user: "Gnamou"

  tasks:
    - name: Verifier si le depot Yarn existe
      stat:
        path: "{{ yarn_repo_file }}"
      register: yarn_repo_stat

    - name: Desactiver temporairement le depot Yarn
      command: mv "{{ yarn_repo_file }}" "{{ yarn_repo_disabled_file }}"
      when: yarn_repo_stat.stat.exists
      changed_when: true

    - name: Mettre a jour le cache APT
      apt:
        update_cache: true

    - name: Installer nginx
      apt:
        name: nginx
        state: present

    - name: Verifier que le repertoire web existe
      file:
        path: /var/www/html
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deployer la page HTML DEV
      template:
        src: files/index.html
        dest: "{{ page_dest }}"
        owner: root
        group: root
        mode: "0644"
      notify: Restart nginx

    - name: Demarrer nginx
      service:
        name: nginx
        state: started
        enabled: true

  handlers:
    - name: Restart nginx
      service:
        name: nginx
        state: restarted

